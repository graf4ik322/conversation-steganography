version: "3.8"

services:
  steganography:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/graf4ik322/conversation-steganography:latest
    container_name: steganography
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # === Session ===
      - SESSION_SLIDING_TTL=15m
      - SESSION_MAX_TTL=12h
      # === Model Backend (pick one) ===
      # OpenRouter mode (no local GPU needed):
      - OPENROUTER_ENABLED=false
      - OPENROUTER_API_KEY=
      - OPENROUTER_MODEL=meta-llama/llama-3.2-3b-instruct
      # Local mode (needs more RAM/CPU):
      - LOCAL_MODEL=openai-community/gpt2
      - LOCAL_DEVICE=cpu
      # === Generative tuning ===
      - TOP_N=5
      - TEMPERATURE=0.7
      - FINISH_TOKENS=10
      - CANDIDATE_POOL=20
      - CARRIER_TRIALS=3
    # Optional: mount model cache for local mode
    # volumes:
    #   - model-cache:/root/.cache/huggingface

# volumes:
#   model-cache:
