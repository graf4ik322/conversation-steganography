version: "3.8"

services:
  steganography:
    image: ghcr.io/graf4ik322/conversation-steganography:latest
    container_name: steganography
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # === Session ===
      - SESSION_SLIDING_TTL=15m
      - SESSION_MAX_TTL=12h
      # === Model Backend ===
      # OpenRouter mode (рекомендуется — лёгкий, без GPU):
      - OPENROUTER_ENABLED=true
      - OPENROUTER_API_KEY=sk-or-v1-...
      - OPENROUTER_MODEL=meta-llama/llama-3.2-3b-instruct
      # Если токенайзер отличается от модели (редко):
      # - OPENROUTER_TOKENIZER_MODEL=
      # Локальная модель (нужен PyTorch ~3GB):
      # - OPENROUTER_ENABLED=false
      # - LOCAL_MODEL=openai-community/gpt2
      # - LOCAL_DEVICE=cpu
      # === Generative ===
      - TOP_N=5
      - TEMPERATURE=0.7
      - FINISH_TOKENS=10
      - CANDIDATE_POOL=20
      - CARRIER_TRIALS=3
    # Для локальной модели — кэш HuggingFace:
    # volumes:
    #   - hf-cache:/root/.cache/huggingface

# volumes:
#   hf-cache:
